
name: Self-Hosted CI


#workflow트리거 전략
on:
  push:
    branches: ['**']
    pull_request:
      branches: ['main','devlop']
    workflow_dispatch: #자동으로 실행되다 사영자가 원할때 수동으로 바꿀 수 있는 트리거

permissions:
  contents: read



jobs:
  test:
    runs-on: self-hosted

  build:
    runs-on: self-hosted
    env:
      IMAGE_REPO: KTB-BoardProject2026

  steps:
    # 코드 체크아웃
    -name: Checkout code
    uses: actions/checkout@v2

      #docker hub 로그인
    -name: Docker Login
    run: |
        echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ 
      secrets.DOCKER_USERNAME }}" --password-stdin

    #브랜치명을 이용한 이미지 태그 생성 - latest X
    -name: Determine image tag
    id: vars
    run: |
    #커밋 해시 추출 7자리 추춘
      SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
      
      
      BRANCH_NAME=${GITHUB_REF#refs/heads/} # 브랜치명 정규화
      SAFE_BRANCH_NAME=$(echo $BRANCH_NAME | sed 's#[^a-zA-Z0-9_.-]#-#g')
      
      
      TAG="${SAFE_BRANCH_NAME}-${SHORT_SHA}" # 브랜치명과 커밋 해시를 조합하여 고유한 태그 생성
      
     
      echo "tag=$TAG" >> $GITHUB_OUTPUT # 출력 변수 저장
      echo "Determined tag: $TAG"

    #이미지 빌드
    -name: Build Docker image
    run: |
        docker build --platform linux/amd64 -t ${{ secrets.DOCKER_
      USERNAME }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.tag }} .
      

    #이미지 푸시
    -name: Push Docker image
    run: | 
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO 
      }}:${{ steps.vars.outputs.tag }}







  deploy:
    needs: build
    runs-on: self-hosted
    step:
      #환경 실행용
      -uses: actions/checkout@v3 #코드 내려받기

      -name: Set up JDK 17 #자바 설치
      uses: actions/setup-java@v3
      with:
        java-version:'17'
        distribution: 'temurin'

      -name: build with Gradle #빌드 실행 테스
        run: ./gradlew clean build







    #실제 수행용
    run:



    # 파이프 라인 -성공/실패
    on_success:
      needs: build
      if: success()

      needs: build
      if: failure()


