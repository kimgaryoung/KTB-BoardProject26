name: Self Hosted Runner Frontend CD

on:
  workflow_run:
    workflows:
      - Self Hosted Runner frontend CI
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on:
      - self-hosted
      - Linux
      - X64

    timeout-minutes: 5

    env:
      AWS_REGION: ap-northeast-2
      ECR_REPOSITORY: scarlett-frontend
      FRONTEND_PRIVATE_IP: 10.0.0.84

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Set image information
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity \
            --query Account \
            --output text)"

          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          IMAGE_TAG="$(date -u +'%Y%m%d-%H%M%S')"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

          echo "IMAGE_TAG=$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI"

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password \
            --region "$AWS_REGION" \
          | docker login \
              --username AWS \
              --password-stdin "$ECR_REGISTRY"

      - name: Check Dockerfile
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -iname 'Dockerfile*' -print

      - name: Build Docker image
        run: |
          set -euo pipefail

          docker build \
            -f ./frontend/Dockerfile \
            -t "$IMAGE_URI" \
            ./frontend
          
      
      

      - name: Push docker image
        run: |
          docker push "$IMAGE_URI"

      - name: Test SSH connection
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i "$HOME/.ssh/frontend-deploy-key" \
            ubuntu@"$FRONTEND_PRIVATE_IP" \
            "hostname && whoami"

      - name: Deploy  Frontend
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -i "$HOME/.ssh/frontend-deploy-key" \
            ubuntu@"$FRONTEND_PRIVATE_IP" \
            bash -s -- \
              "$AWS_REGION" \
              "$ECR_REGISTRY" \
              "$IMAGE_URI" <<'REMOTE_SCRIPT'

          set -euo pipefail

          AWS_REGION="$1"
          ECR_REGISTRY="$2"
          IMAGE_URI="$3"

          aws ecr get-login-password \
            --region "$AWS_REGION" \
          | docker login \
              --username AWS \
              --password-stdin "$ECR_REGISTRY"

          docker pull "$IMAGE_URI"

          docker rm -f board-project-frontend \
            2>/dev/null || true

          docker run -d \
            --name board-project-frontend \
            --restart unless-stopped \
            -p 8080:8080 \
            -e API_BASE_URL="/api" \
            "$IMAGE_URI"

          docker image prune -f

          docker ps \
            --filter "name=board-project-frontend"

          REMOTE_SCRIPT