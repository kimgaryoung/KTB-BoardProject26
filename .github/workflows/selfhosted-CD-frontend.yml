name: Self Hosted Runner frontend CD

on:
  workflow_run:
    workflows:
      - Self Hosted Runner frontend CI
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      API_BASE_URL: http://15.165.231.154:3000

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t board-project-frontend:latest ./frontend

      - name: Deploy
        run: |
          set -euo pipefail

          if docker ps -a --format '{{.Names}}' | grep -Fxq board-project-frontend; then
            docker rm -f board-project-frontend
          fi

          docker run -d \
            --name board-project-frontend \
            --restart unless-stopped \
            -p 8080:8080 \
            -e API_BASE_URL="${API_BASE_URL:-/api}" \
            board-project-frontend:latest

          echo " completed."
