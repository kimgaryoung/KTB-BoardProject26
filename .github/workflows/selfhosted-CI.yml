

name: self hosted Runner github action workflow CI

on:
  push:
    branches:
      - main
    pull_request:
      branches:
        - main


jobs:
  ci:
    runs-on: self hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-presen




jobs:
  ci:
    runs-on: self hosted
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17 for X64
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64

      - name: Setup Gradle
        uses:

      - name: Build with Gradle
        run: ./gradlew -b ci.gradle package


  deploy:
    runs-on: self hosted
    needs : build

