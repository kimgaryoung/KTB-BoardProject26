name: Self Hosted Runner backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published



jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 10


    steps:
      - name: test 코드 작성후 추가 해보기
        run: |
          echo "테스트step1"
          




  build:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

