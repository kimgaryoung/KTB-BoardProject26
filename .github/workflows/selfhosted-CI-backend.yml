name: Self Hosted Runner backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published



jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: test 코드 작성후 추가 해보기
        run: |
          echo "테스트step1"
          



  build:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: x64

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy application
        run: |
          echo "배포 시작"
          echo "여기에 docker build / docker run 명령어 작성"
          echo "배포 완료"