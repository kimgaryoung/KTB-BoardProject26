name: Self Hosted Runner backend CD

on:
  workflow_run:
    workflows:
      - Self Hosted Runner backend CI
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 4
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_S3_BASE_URL: ${{ secrets.AWS_S3_BASE_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Deploy backend application
        run: |
          set -euo pipefail

          : "${DB_URL:?Missing secret DB_URL}"
          : "${DB_USERNAME:?Missing secret DB_USERNAME}"
          : "${DB_PASSWORD:?Missing secret DB_PASSWORD}"
          : "${JWT_SECRET:?Missing secret JWT_SECRET}"

          APP_DIR="$HOME/apps/board-backend"
          mkdir -p "$APP_DIR"
          cp build/libs/*.jar "$APP_DIR/app.jar"

          if [ -f "$APP_DIR/app.pid" ]; then
            OLD_PID="$(cat "$APP_DIR/app.pid")"
            if kill -0 "$OLD_PID" 2>/dev/null; then
              kill "$OLD_PID"
              sleep 5
              if kill -0 "$OLD_PID" 2>/dev/null; then
                kill -9 "$OLD_PID"
                sleep 2
              fi
            fi
          fi

          nohup java -jar "$APP_DIR/app.jar" > "$APP_DIR/app.log" 2>&1 &
          

          sleep 5
          if ! kill -0 "$(cat "$APP_DIR/app.pid")" 2>/dev/null; then
            echo "Backend failed to start. Recent log:"
            tail -n 80 "$APP_DIR/app.log"
            exit 1
          fi

          echo " completed. PID=$(cat "$APP_DIR/app.pid")"
