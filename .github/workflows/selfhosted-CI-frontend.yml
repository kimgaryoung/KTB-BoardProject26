name: Self Hosted Runner frontCI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  test:
    runs-on: self-hosted





  build:
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.4.0'
      - name: Install dependencies
        run: npm ci





