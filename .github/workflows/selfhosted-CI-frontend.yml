name: Self Hosted Runner frontCI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.4.0'
      - name: Install dependencies
        run: npm ci



  build:
    runs-on: self-hosted
    needs: test






  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Deploy application
        run: |
          echo "배포 시작"
          echo "여기에 docker build / docker run 명령어 작성"
          echo "배포 완료"
