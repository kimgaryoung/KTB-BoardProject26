name: Self Hosted Runner frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:



  build:
    runs-on: self-hosted


    steps:
      - name: Checkout source code
        uses: actions/checkout@v4



      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci



